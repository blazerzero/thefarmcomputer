name = "thefarmcomputer"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[assets]
directory = "./web/dist"
binding = "ASSETS"
run_worker_first = true

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[triggers]
crons = ["0 8 1 * *"]

[[durable_objects.bindings]]
name = "STARDEW_DO"
class_name = "StardewDO"

[[migrations]]
tag = "v2"
new_sqlite_classes = ["StardewDO"]

[[d1_databases]]
binding = "USER_DB"
database_name = "thefarmcomputer-users"
database_id = "PLACEHOLDER_RUN_WRANGLER_D1_CREATE"
